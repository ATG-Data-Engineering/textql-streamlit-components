<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/></head>
<body style="font-family:sans-serif;padding:12px;background:#fff;">
<p id="status" style="color:#666;font-size:.8rem;">Initialising...</p>
<button onclick="sendHello()" style="margin-top:8px;padding:6px 14px;background:#2563eb;color:#fff;border:none;border-radius:4px;cursor:pointer;">
  Send "hello" to Streamlit
</button>

<script>
// Read the streamlitUrl query param — Streamlit passes this so we know
// the exact origin to target with postMessage
const params = new URLSearchParams(window.location.search);
const streamlitUrl = params.get('streamlitUrl');
const targetOrigin = streamlitUrl ? new URL(streamlitUrl).origin : '*';

document.getElementById('status').textContent = 'targetOrigin: ' + targetOrigin;

const Streamlit = {
  setComponentReady: function() {
    window.parent.postMessage({ type: 'streamlit:componentReady', apiVersion: 1 }, targetOrigin);
  },
  setComponentValue: function(value) {
    window.parent.postMessage({ type: 'streamlit:setComponentValue', value: value }, targetOrigin);
  },
  setFrameHeight: function(h) {
    window.parent.postMessage({ type: 'streamlit:setFrameHeight', height: h }, targetOrigin);
  },
  onRender: function(cb) {
    window.addEventListener('message', function(e) {
      if (e.data.type === 'streamlit:render') cb(e);
    });
  }
};

Streamlit.setFrameHeight(100);
Streamlit.setComponentReady();

Streamlit.onRender(function(e) {
  document.getElementById('status').textContent = 'Render received! args: ' + JSON.stringify(e.data.args);
  Streamlit.setFrameHeight(document.body.scrollHeight + 10);
});

function sendHello() {
  Streamlit.setComponentValue('hello from iframe');
  document.getElementById('status').textContent = 'Value sent to Streamlit!';
}
</script>
</body>
</html>
