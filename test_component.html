<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/></head>
<body style="font-family:sans-serif;padding:12px;background:#fff;">
<p id="status" style="color:#666;">Initialising...</p>
<button onclick="sendHello()" style="margin-top:8px;padding:6px 14px;background:#2563eb;color:#fff;border:none;border-radius:4px;cursor:pointer;">
  Send "hello" to Streamlit
</button>

<script>
// Minimal inline Streamlit bridge
const Streamlit = {
  setComponentReady: function() {
    window.parent.postMessage({ type: 'streamlit:componentReady', apiVersion: 1 }, '*');
  },
  setComponentValue: function(value) {
    window.parent.postMessage({ type: 'streamlit:setComponentValue', value: value }, '*');
  },
  setFrameHeight: function(h) {
    window.parent.postMessage({ type: 'streamlit:setFrameHeight', height: h }, '*');
  },
  onRender: function(cb) {
    window.addEventListener('message', function(e) {
      if (e.data.type === 'streamlit:render') cb(e);
    });
  }
};

document.getElementById('status').textContent = 'Ready — waiting for render event';
Streamlit.setFrameHeight(80);
Streamlit.setComponentReady();

Streamlit.onRender(function(e) {
  document.getElementById('status').textContent = 'Render received: ' + JSON.stringify(e.data.args);
  Streamlit.setFrameHeight(document.body.scrollHeight + 10);
});

function sendHello() {
  Streamlit.setComponentValue('hello from iframe');
  document.getElementById('status').textContent = 'Sent value to Streamlit!';
}
</script>
</body>
</html>
